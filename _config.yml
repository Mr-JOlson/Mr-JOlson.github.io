# _config.yml for Physicsy Website
title: Physicsy | Jason Olson
description: >-
  High school Physics, Biology, and Astronomy resources from Gulf Breeze High School.
  Lesson materials, robotics, writing projects, and more.
url: "https://www.physicsy.com"
baseurl: "" 

# Author info
author:
  name: Jason Olson
  email: your-email@example.com
  github_username: Mr-JOlson

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/ 

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

# SEO and social
twitter_username: MrJ_Olson
github_username: Mr-JOlson

# Collections (add more later if needed)
collections:
  resources:
    output: true
  posts:
    output: true

# Pagination (for blog)
paginate: 10
paginate_path: "/page/:num/"

# Excludes
exclude:
  - .jekyll-cache/
  - .bundle/
  - vendor/
  - Gemfile
  - Gemfile.lock

# Future posts (useful during development)
future: false

# Defaults for front matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
    values:
      layout: "post"