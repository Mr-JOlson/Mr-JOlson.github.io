# _config.yml for Physicsy Website
title: Physicsy | Jason Olson
description: >-
  High school Physics, Biology, and Astronomy resources for Gulf Breeze High School students.
  Lesson materials, AI & robotics projects, writing, and more.
url: "https://www.physicsy.com"
baseurl: ""

# Theme
remote_theme: pages-themes/minimal@v0.2.0
show_downloads: false

# Author info
author:
  name: Jason Olson
  email: olsonj@santarosa.k12.fl.us
  github_username: Mr-JOlson

# Navigation (sidebar links)
navigation:
  - name: Home
    link: /
  - name: Physics
    link: /physics1-honors/
  - name: Biology
    link: /biology-honors/
  - name: Astronomy
    link: /astronomy/
  - name: "AI & Robotics"
    link: /ai-robotics/
  - name: Writing
    link: /writing-projects/

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-remote-theme

# SEO and social
twitter_username: MrJ_Olson
github_username: Mr-JOlson

# Collections
collections:
  resources:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - .jekyll-cache/
  - .bundle/
  - vendor/