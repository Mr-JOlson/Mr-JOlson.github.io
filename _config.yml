# _config.yml for Physicsy Website
title: Physicsy | Jason Olson
description: >-
  High school Physics, Biology, and Astronomy resources for Gulf Breeze High School students.
  Lesson materials, robotics, writing projects, and more.
url: "https://www.physicsy.com"
baseurl: ""

# Author info
author:
  name: Jason Olson
  email: olsonj@santarosa.k12.fl.us
  github_username: Mr-JOlson

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

# SEO and social
twitter_username: MrJ_Olson
github_username: Mr-JOlson

# Collections
collections:
  resources:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - .jekyll-cache/
  - .bundle/
  - vendor/
